<!-- Outer wrapper: carries state CSS classes -->
<div class="wj-combo-wrapper" [class]="_cssClass()">

  <!--
    The adapter mounts its underlying control (Wijmo ComboBox, mat-select, etc.)
    onto this element in ngAfterViewInit.

    ARIA split:
    • aria-label, aria-required, aria-placeholder → forwarded by the adapter
      directly onto the inner focusable element (mat-select trigger / Wijmo input),
      because screen readers only read ARIA attributes on the element that actually
      receives keyboard focus — not on an ancestor wrapper div.
    • aria-describedby → kept here so the error <span> ID is associated with the
      host node; adapters that expose their focusable element's describedby can
      additionally forward it, but the association still works at the wrapper level
      for most AT.
    • aria-invalid → kept here as a visual/scripted hook; adapters should also set
      it on the inner focusable element when the value changes.
  -->
  <div
    #adapterHost
    class="dropdown-adapter-host"
    [id]="id()"
    [attr.aria-describedby]="ariaDescribedBy() || (isInvalid() ? id() + '-error' : null)"
    [attr.aria-invalid]="isInvalid() || null">
  </div>

  <!-- Floating label — linked to the host div id; adapters should honour this -->
  @if (showLabel() && label()) {
  <label [attr.for]="id()" [class.active]="isFocused() || hasValue()">
    {{ label() }}
    @if (required()) {
    <span class="wj-required-marker" aria-hidden="true"> *</span>
    }
  </label>
  }

  <!-- Clear button -->
  @if (showClearButton() && hasValue() && !effectiveDisabled() && !readonly()) {
  <button
    type="button"
    class="wj-combo-clear"
    aria-label="Clear selection"
    (click)="clear()"
    tabindex="-1">
    <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
      <path
        d="M12 4L4 12M4 4l8 8"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round" />
    </svg>
  </button>
  }

  <!-- Validation error message -->
  @if (isInvalid()) {
  <span
    class="text-danger visible"
    role="alert"
    aria-live="polite"
    [attr.id]="id() + '-error'">
    {{ getErrorMessage() }}
  </span>
  }

</div>
