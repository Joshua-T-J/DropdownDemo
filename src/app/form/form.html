<div class="container">
    <P>Touched - {{UserForm.touched}}</P>
    <P>Valid - {{UserForm.valid}}</P>
    @let data=UserForm.value;
    @if(data){
    <pre>{{ data | json }}</pre>
    }
    @else{
    <p>No form data</p>
    }
    <div class="row mt-5 justify-content-center">
        <div class="col-3">
            <button type="button" class="btn btn-secondary me-3" (click)="loadFormData()">Load Data</button>
            <button type="button" class="btn btn-secondary" (click)="toggleForm()">Edit</button>
        </div>
        <form [formGroup]="UserForm" (ngSubmit)="formSubmit()">
            <div class="col-9">
                <div class="mb-3">
                    <label for="exampleFormControlInput1" class="form-label">Email address</label>
                    <input type="email" class="form-control" formControlName="email" id="exampleFormControlInput1">
                </div>
                <div class="mb-3">
                    <label for="exampleFormControlInput2" class="form-label">Name</label>
                    <input type="text" class="form-control" formControlName="name" id="exampleFormControlInput2">
                </div>
            </div>
            <div class="row">
                <div class="col-3">
                    <div class="mb-3">
                        <app-dropdown-wrapper [itemsSource]="Types" formControlName="type"
                            [displayMemberPath]="'type'" label="Type" [placeholder]="'Select Type'" [selectedValuePath]="'id'" [id]="'CountryList'"></app-dropdown-wrapper>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-3">
                    <div class="mb-3">
                        <app-dropdown-wrapper [itemsSource]="Contries" formControlName="country" (selectedItemChange)="countryChange($event)"
                            [displayMemberPath]="'CountryName'" label="Country" [placeholder]="'Select Country'" [selectedValuePath]="'id'" [id]="'CountryList'"></app-dropdown-wrapper>
                        <!-- {{ UserForm.get('country')?.errors | json }}
                        {{ UserForm.get('country')?.touched }} -->
                    </div>
                </div>
                <div class="col-3">
                    <div class="mb-3">
                        <app-dropdown-wrapper [itemsSource]="FilteredStates" (itemsSourceLoaded)="onItemsSourceLoaded('State', $event)" formControlName="state" (selectedItemChange)="stateChange($event)"
                            [displayMemberPath]="'StateName'" [showErrors]="true" label="State" [placeholder]="'Select State'" [selectedValuePath]="'id'" [id]="'StateList'"></app-dropdown-wrapper>
                        <!-- {{ UserForm.get('state')?.errors | json }}
                        {{ UserForm.get('state')?.touched }} -->
                    </div>
                </div>
                <div class="col-3">
                    <div class="mb-3">
                        <app-dropdown-wrapper [itemsSource]="FilteredCities" (itemsSourceLoaded)="onItemsSourceLoaded('City', $event)" formControlName="city" [id]="'CityList'"
                            [displayMemberPath]="'CityName'" label="City" [placeholder]="'Select City'" [selectedValuePath]="'id'"></app-dropdown-wrapper>
                        <!-- {{ UserForm.get('city')?.errors | json }}
                        {{ UserForm.get('city')?.touched }} -->
                    </div>
                </div>
            </div>
            <button type="submit" class="btn btn-primary me-2">Submit</button>
            <button type="button" class="btn btn-primary" (click)="resetForm()">Reset</button>
        </form>

        <div class="row">
            <div class="col-3">
                <div class="mb-3">
                    <app-dropdown-wrapper [disabled]="Disabled" [itemsSource]="Contries" [(selectedValue)]="selectedCountry" (selectedItemChange)="countryChange($event)"
                        [displayMemberPath]="'CountryName'" [placeholder]="'Select Country'" [selectedValuePath]="'id'" [id]="'CountryListTest'"></app-dropdown-wrapper>
                    {{ selectedCountry | json }}
                </div>
            </div>
        </div>
    </div>
</div>
